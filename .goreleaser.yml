# GoReleaser Configuration
# https://goreleaser.com

project_name: dbbee

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/dbbee/main.go
    binary: dbbee

archives:
  - format: tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE*
      - README*

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

brews:
  - name: dbbee
    repository:
      owner: SiamAlSobari
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/SiamAlSobari/dbbee"
    description: "Lightweight, CGO-free interactive SQLite terminal browser TUI in Go"

scoops:
  - name: dbbee
    repository:
      owner: SiamAlSobari
      name: scoop-bucket
    homepage: "https://github.com/SiamAlSobari/dbbee"
    description: "Lightweight, CGO-free interactive SQLite terminal browser TUI in Go"
